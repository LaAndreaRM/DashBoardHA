<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DashBoard HA - Panel Avanzado</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #0B0F19; color: #EEEEEE; }
        .bg-card { background-color: #1F2937; border: 1px solid #374151; }
        .tab-active { border-bottom: 3px solid #10B981; color: #10B981; font-weight: 700; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .text-income { color: #10B981; }
        .text-expense { color: #F87171; }
        .input-filter { background-color: #111827; border: 1px solid #4B5563; color: #FFF; padding: 4px 8px; border-radius: 4px; font-size: 11px; width: 100%; font-weight: normal; }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">

    <div class="max-w-7xl mx-auto space-y-6">
        <div class="flex justify-between items-center">
            <h1 class="text-3xl font-bold text-white">DashBoard HA</h1>
            <div id="loadingStatus" class="text-amber-400 text-sm font-semibold flex items-center gap-2 bg-amber-500/10 px-3 py-1.5 rounded-lg border border-amber-500/20">
                <i class="fa-solid fa-spinner fa-spin"></i> Cargando datos...
            </div>
        </div>

        <div class="flex flex-wrap items-center gap-6 bg-card p-4 rounded-xl">
            <select id="yearFilter" class="bg-gray-900 border border-gray-700 text-white p-2 rounded-lg text-sm"><option value="TODOS">TODOS LOS AÑOS</option></select>
            <select id="monthFilter" class="bg-gray-900 border border-gray-700 text-white p-2 rounded-lg text-sm" disabled><option value="TODOS">TODOS LOS MESES</option></select>
        </div>

        <div class="border-b border-gray-800">
            <ul class="flex flex-wrap text-sm font-medium text-center gap-6">
                <li class="cursor-pointer py-2 px-1 tab-link tab-active" onclick="switchTab(event, 'tab-resumen')">Resumen</li>
                <li class="cursor-pointer py-2 px-1 tab-link" onclick="switchTab(event, 'tab-ingresos')">Ingresos</li>
                <li class="cursor-pointer py-2 px-1 tab-link" onclick="switchTab(event, 'tab-costo-ordinario')">Costo Ordinario</li>
                <li class="cursor-pointer py-2 px-1 tab-link" onclick="switchTab(event, 'tab-gasto-operativo')">Gasto Operativo</li>
                <li class="cursor-pointer py-2 px-1 tab-link" onclick="switchTab(event, 'tab-gasto-administrativo')">Gasto Administrativo</li>
                <li class="cursor-pointer py-2 px-1 tab-link" onclick="switchTab(event, 'tab-gasto-personal')">Gasto Personal</li>
            </ul>
        </div>

        <div id="tab-resumen" class="tab-content active space-y-6">
            <div class="grid grid-cols-1 sm:grid-cols-4 gap-4">
                <div class="bg-card p-5 rounded-2xl border-l-4 border-emerald-500"><p class="text-xs text-gray-400">INGRESOS</p><h2 id="kpiIngresos" class="text-2xl font-bold text-income">$ 0</h2></div>
                <div class="bg-card p-5 rounded-2xl border-l-4 border-red-400"><p class="text-xs text-gray-400">EGRESOS</p><h2 id="kpiEgresos" class="text-2xl font-bold text-expense">$ 0</h2></div>
                <div class="bg-card p-5 rounded-2xl border-l-4 border-cyan-400"><p class="text-xs text-gray-400">UTILIDAD</p><h2 id="kpiUtilidad" class="text-2xl font-bold text-cyan-400">$ 0</h2></div>
                <div class="bg-card p-5 rounded-2xl border-l-4 border-purple-500"><p class="text-xs text-gray-400">MARGEN</p><h2 id="kpiMargen" class="text-2xl font-bold text-purple-400">0%</h2></div>
            </div>
            <div class="h-80 bg-card p-6 rounded-2xl"><canvas id="chartComparativo"></canvas></div>
        </div>

        <div id="tab-ingresos" class="tab-content bg-card p-4 rounded-xl"><table class="w-full text-left" id="table-ingresos"></table></div>
        <div id="tab-costo-ordinario" class="tab-content bg-card p-4 rounded-xl"><table class="w-full text-left" id="table-costo-ordinario"></table></div>
        <div id="tab-gasto-operativo" class="tab-content bg-card p-4 rounded-xl"><table class="w-full text-left" id="table-gasto-operativo"></table></div>
        <div id="tab-gasto-administrativo" class="tab-content bg-card p-4 rounded-xl"><table class="w-full text-left" id="table-gasto-administrativo"></table></div>
        <div id="tab-gasto-personal" class="tab-content bg-card p-4 rounded-xl"><table class="w-full text-left" id="table-gasto-personal"></table></div>
    </div>

    <script>
        let rawEgresos = [], rawIngresos = [];
        let selectedYear = "TODOS", selectedMonth = "TODOS";
        let chartBar = null;
        const mesesAbrev = ['ENE', 'FEB', 'MAR', 'ABR', 'MAY', 'JUN', 'JUL', 'AGO', 'SEP', 'OCT', 'NOV', 'DIC'];

        function switchTab(e, tabId) {
            document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
            document.querySelectorAll('.tab-link').forEach(tl => tl.classList.remove('tab-active'));
            document.getElementById(tabId).classList.add('active');
            e.currentTarget.classList.add('tab-active');
            renderTables();
        }

        function formatCurrency(val) { return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(val); }

        function renderTables() {
            const y = document.getElementById('yearFilter').value;
            const m = document.getElementById('monthFilter').value;
            const mapeo = {
                'table-ingresos': { data: rawIngresos, cat: null },
                'table-costo-ordinario': { data: rawEgresos, cat: 'Costo Ordinario' },
                'table-gasto-operativo': { data: rawEgresos, cat: 'Gasto operativo' },
                'table-gasto-administrativo': { data: rawEgresos, cat: 'Gasto administrativo' },
                'table-gasto-personal': { data: rawEgresos, cat: 'Gasto personal' }
            };

            Object.keys(mapeo).forEach(id => {
                const conf = mapeo[id];
                const tabla = document.getElementById(id);
                if (!tabla) return;
                const filtrados = conf.data.filter(i => {
                    const matchY = (y === "TODOS" || i.ANIO == y);
                    const matchM = (m === "TODOS" || i.MES_TXT == m);
                    const matchCat = !conf.cat || i.TIPO == conf.cat;
                    return matchY && matchM && matchCat;
                });
                tabla.innerHTML = filtrados.map(i => `
                    <tr class="border-b border-gray-700">
                        <td class="p-3">${i.FECHA || ''}</td>
                        <td class="p-3">${i.DESCRIPCION || i.TIPO}</td>
                        <td class="p-3 text-right font-bold text-emerald-400">${formatCurrency(i.TOTAL || i.VALOR || 0)}</td>
                    </tr>`).join('');
            });
        }

        function loadExcelAutomatically() {
            const fileId = "17svRLWvupcy0ZVIC52xV8mcHEXHUhwBh";
            fetch(`https://docs.google.com/spreadsheets/d/${fileId}/export?format=xlsx`)
                .then(res => res.arrayBuffer())
                .then(buffer => {
                    const workbook = XLSX.read(new Uint8Array(buffer), { type: 'array' });
                    // Procesar Datos
                    const ws = workbook.Sheets["Datos"];
                    const rawRows = XLSX.utils.sheet_to_json(ws, { header: 1 });
                    rawEgresos = rawRows.slice(1).map(r => ({ANIO: r[0], MES_TXT: r[1], FECHA: r[2], DESCRIPCION: r[3], TIPO: r[4], TOTAL: r[5]})).filter(i => i.TOTAL);
                    
                    const wsIn = workbook.Sheets["Res Ingresos"];
                    const rawRowsIn = XLSX.utils.sheet_to_json(wsIn, { header: 1 });
                    rawIngresos = rawRowsIn.slice(1).map(r => ({ANIO: r[0], MES_TXT: r[1], FECHA: r[2], TIPO: r[3], VALOR: r[4]})).filter(i => i.VALOR);
                    
                    updateDashboard();
                });
        }

        function updateDashboard() {
            const totalIngresos = rawIngresos.reduce((s, i) => s + i.VALOR, 0);
            const totalEgresos = rawEgresos.reduce((s, e) => s + e.TOTAL, 0);
            document.getElementById('kpiIngresos').innerText = formatCurrency(totalIngresos);
            document.getElementById('kpiEgresos').innerText = formatCurrency(totalEgresos);
            document.getElementById('kpiUtilidad').innerText = formatCurrency(totalIngresos - totalEgresos);
            renderTables();
        }

        document.getElementById('yearFilter').addEventListener('change', () => { 
            selectedYear = document.getElementById('yearFilter').value; 
            updateDashboard(); 
        });

        window.addEventListener('DOMContentLoaded', loadExcelAutomatically);
    </script>
</body>
</html>
